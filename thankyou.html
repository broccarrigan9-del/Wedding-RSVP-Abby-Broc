<!DOCTYPE html>
<html lang="en">
<head>
  <link href="main.css" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Thank You</title>
  <style>
    body {
      font-family: 'Playfair Display', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f9f9f7;
      margin: 0;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      max-width: 500px;
      text-align: center;
    }

    p {
      font-family: 'Lato', sans-serif;
      font-size: 1.1rem;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2 id="heading"></h2>
    <p id="message"></p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const status = params.get("status");

    if (status === "decline") {
      document.getElementById("heading").textContent = "We’re Sorry to Miss You";
      document.getElementById("message").textContent =
        "We hope to see you soon and appreciate you letting us know.";
    } else {
      document.getElementById("heading").textContent = "Thank You!";
      document.getElementById("message").textContent =
        "We are excited to see you and celebrate together.";
    }
  </script>
</body>
</html>
