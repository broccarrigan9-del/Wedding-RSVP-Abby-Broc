<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding RSVP | Abby & Broc</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Lato', sans-serif;
      background-color: #f9f9f7;
      color: #333;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      padding: 40px;
      background-color: #ffffff;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      border-radius: 12px;
    }

    .hero-image {
      height: 280px;
      overflow: hidden;
      border-radius: 12px;
      margin-bottom: 25px;
    }

    .hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      text-align: center;
      margin: 0;
    }

    p, ul {
      text-align: center;
      line-height: 1.6;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 20px 0;
    }

    form {
      margin-top: 30px;
    }

    label {
      display: block;
      margin-top: 16px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-family: 'Lato', sans-serif;
    }

    button {
      width: 100%;
      margin-top: 30px;
      padding: 12px;
      background-color: #6b8e7f;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-family: 'Playfair Display', serif;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- PHOTO -->
    <div class="hero-image">
      <img src="abby-and-broc.JPG" alt="Abby and Broc">
    </div>

    <!-- TEXT -->
    <h1>We are excited for you to join us!</h1>
    <h2>Abby & Broc</h2>
    <p><strong>August 13, 2026</strong></p>

    <ul>
      <li>💍 Sealing — Lindon Utah Temple</li>
      <li>🌿 Reception — Walker Farms</li>
    </ul>

    <p>Please RSVP by <strong>August 1, 2026</strong></p>

    <!-- RSVP FORM -->
    <form id="rsvpForm">
      <h3>RSVP</h3>

      <label>
        Your Name
        <input type="text" name="guest_name" required>
      </label>

      <label>
        Number attending the Sealing
        <input type="number" name="sealing_count" min="0" value="0">
      </label>

      <label>
        Number attending the Luncheon
        <input type="number" name="luncheon_count" min="0" value="0">
      </label>

      <label>
        Number attending the Reception
        <input type="number" name="reception_count" min="0" value="0">
      </label>

      <label>
        Notes
        <textarea name="notes"></textarea>
      </label>

      <button type="submit">Submit RSVP</button>
    </form>

  </div>

  <!-- JS -->
  <script>
    const form = document.getElementById("rsvpForm");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const sealing = Number(form.sealing_count.value);
      const luncheon = Number(form.luncheon_count.value);
      const reception = Number(form.reception_count.value);

      const payload = {
        guest_name: form.guest_name.value,
        sealing_count: sealing,
        luncheon_count: luncheon,
        reception_count: reception,
        notes: form.notes.value
      };

      fetch("https://script.google.com/macros/s/AKfycbyRuXDrqu5NtsyEwcP_Y7uG2rnDnrJ42diF2mpcOeErWrf9UCbKE_HARaUY4Hv2fjy_/exec", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      }).then(() => {
        if (sealing === 0 && luncheon === 0 && reception === 0) {
          window.location.href = "thankyou.html?status=decline";
        } else {
          window.location.href = "thankyou.html?status=accept";
        }
      }).catch(() => {
        alert("Something went wrong. Please try again.");
      });
    });
  </script>
</body>
</html>
