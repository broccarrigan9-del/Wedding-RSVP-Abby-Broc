  <!-- JS -->
  <script>
    const form = document.getElementById("rsvpForm");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const sealing = Number(form.sealing_count.value);
      const luncheon = Number(form.luncheon_count.value);

      const payload = {
        guest_name: form.guest_name.value,
        sealing_count: sealing,
        luncheon_count: luncheon,
        notes: form.notes.value
      };

      fetch("https://script.google.com/macros/s/AKfycbyRuXDrqu5NtsyEwcP_Y7uG2rnDnrJ42diF2mpcOeErWrf9UCbKE_HARaUY4Hv2fjy_/exec", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      })
      .then(() => {
        if (sealing === 0 && luncheon === 0) {
          window.location.href = "thankyou.html?status=decline";
        } else {
          window.location.href = "thankyou.html?status=accept";
        }
      })
      .catch(() => {
        alert("Something went wrong. Please try again.");
      });
    });
  </script>
</body>
</html>
